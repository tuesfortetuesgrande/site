<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prévia TEFTEG</title>
  <style>
    body {
      margin: 0;
      background: #1a1a2e;
      font-family: system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: white;
      flex-direction: column;
      gap: 20px;
    }
    .logo {
      font-size: 48px;
      font-weight: 800;
      color: #c1272d;
    }
    .sub {
      color: #94a3b8;
      font-size: 18px;
    }
    .avatar-preview {
      display: flex;
      gap: 15px;
      margin-top: 10px;
    }
    .avatar-preview .circle {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: 3px solid #c1272d;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 20px;
      color: white;
    }
  </style>
</head>
<body>
  <div class="logo">⚽ TEFTEG</div>
  <div class="sub">Tú és Forte, Tú és Grande</div>
  <div class="avatar-preview">
    <div class="circle" style="background:#c1272d;">TT</div>
    <div class="circle" style="background:#c9a24b;">JD</div>
    <div class="circle" style="background:#2e7d46;">FC</div>
    <div class="circle" style="background:#8f1c21;">MA</div>
  </div>
  <div style="color:#64748b;font-size:14px;margin-top:20px;">Escolha seu nick e avatar</div>
</body>
</html>
